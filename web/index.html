<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>pm</title>
  <meta name="description" content="A tiny project switcher for people with too many repos.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23080a0d'/%3E%3Ctext x='12' y='40' fill='%237dd3fc' font-family='monospace' font-size='24'%3Epm%3C/text%3E%3C/svg%3E">
  <style>
    :root {
      color-scheme: dark;
      --bg: #080a0d;
      --panel: #101419;
      --line: #252c35;
      --text: #e7edf3;
      --muted: #8d98a5;
      --accent: #7dd3fc;
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font: 16px/1.5 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(100%, 920px);
      display: grid;
      grid-template-columns: 0.8fr 1.2fr;
      gap: 32px;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(56px, 13vw, 136px);
      line-height: 0.9;
      text-wrap: balance;
    }

    p {
      margin: 16px 0 0;
      max-width: 16rem;
      color: var(--muted);
      text-wrap: pretty;
    }

    a {
      color: var(--text);
      text-decoration-thickness: 1px;
      text-underline-offset: 5px;
    }

    .actions {
      display: flex;
      gap: 16px;
      margin-top: 28px;
      flex-wrap: wrap;
    }

    .terminal {
      min-height: 360px;
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      background: var(--panel);
      box-shadow: 0 24px 60px rgb(0 0 0 / 0.28);
    }

    .bar {
      display: flex;
      gap: 8px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 999px;
      background: #404955;
    }

    pre {
      margin: 0;
      padding: 22px;
      min-height: 304px;
      white-space: pre-wrap;
      color: var(--text);
      font: 15px/1.6 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      tab-size: 2;
    }

    .prompt { color: var(--accent); }
    .muted { color: var(--muted); }
    .caret::after { content: "▌"; color: var(--accent); }

    @media (max-width: 760px) {
      body { place-items: start center; }
      main { grid-template-columns: 1fr; gap: 28px; }
      .terminal { min-height: 320px; }
      pre { min-height: 264px; font-size: 14px; }
    }
  </style>
</head>
<body>
  <main>
    <section aria-labelledby="title">
      <h1 id="title">pm</h1>
      <p>Switch projects. Open agents. Keep moving.</p>
      <nav class="actions" aria-label="Links">
        <a href="https://github.com/jakeisnt/pm">GitHub</a>
        <a href="#demo">Demo</a>
      </nav>
    </section>

    <section id="demo" class="terminal" aria-label="Animated terminal demo">
      <div class="bar" aria-hidden="true"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
      <pre id="screen" aria-live="polite"></pre>
    </section>
  </main>

  <script>
    const screen = document.querySelector('#screen');
    const script = [
      ['p', '  kitchen        ~/Documents/jakeisnt/kitchen\n  pm             ~/Documents/jakeisnt/pm\n  knitkit        ~/Documents/ulnd/knitkit\n\n→ pm'],
      ['p --agent knitkit', 'opening pi in knitkit'],
      ['p resolve pm', '/Users/jake/Documents/jakeisnt/pm'],
      ['p list --source local', 'kitchen\npm\nknitkit\nuln']
    ];

    const wait = ms => new Promise(resolve => setTimeout(resolve, ms));
    const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
    let running = false;

    function line(command, output = '') {
      const escaped = command.replace(/[&<>]/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[char]));
      return `<span class="prompt">$</span> ${escaped}${output ? `\n<span class="muted">${output}</span>` : ''}`;
    }

    async function type(text) {
      let value = '';
      for (const char of text) {
        if (!running) return;
        value += char;
        screen.innerHTML = `<span class="prompt">$</span> <span class="caret">${value}</span>`;
        await wait(reduceMotion ? 0 : 42);
      }
    }

    async function play() {
      if (running) return;
      running = true;
      while (running) {
        for (const [command, output] of script) {
          await type(command);
          if (!running) return;
          screen.innerHTML = line(command, output);
          await wait(reduceMotion ? 900 : 1600);
        }
      }
    }

    const observer = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) play();
      else running = false;
    });

    observer.observe(document.querySelector('#demo'));
  </script>
</body>
</html>
